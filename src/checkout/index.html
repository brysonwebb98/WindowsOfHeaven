<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Page</title>
    <script src="../js/checkout.js" type="module"></script>
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
    <header id="main-header"></header>  
    <main>
        <h1 class="checkout-h1">Review Checkout Details</h1>
        <section class="checkout-container">
            <form class="checkout-form" id="checkoutForm">
                <h2>Shipping Information</h2>

                <label for="firstName">First Name</label>
                <input type="text" id="firstName" name="firstName" required>

                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" name="lastName" required>

                <label for="street">Street Address</label>
                <input type="text" id="street" name="street" required>

                <label for="city">City</label>
                <input type="text" id="city" name="city" required>

                <label for="state">State</label>
                <input type="text" id="state" name="state">

                <label for="zip">Zip Code</label>
                <input type="text" id="zip" name="zip" required>

                <label for="country">Country</label>
                <select id="country" name="country" required class="country">
                    <option value="">Select</option>
                    <option value="USA">USA</option>
                    <option value="Canada">Canada</option>
                    <option value="Mexico">Mexico</option>
                </select>

                <button type="submit" class="checkout-submit" href="../confirmation/">Submit Order</button>
            </form>

            <section class="order-summary">
                <h2>Order Summary</h2>
                <p>Subtotal: $<span class="checkout-subtotal">0.00</span></p>
                <p>Shipping: $<span class="checkout-shipping">0.00</span></p>
                <p>Total: $<span class="checkout-total">0.00</span></p>
            </section>
        </section>
    </main>
    
    <footer id="main-footer"></footer>
</body>
</html>
